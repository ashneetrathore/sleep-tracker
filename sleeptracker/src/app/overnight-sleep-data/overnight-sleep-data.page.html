<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-title>Log Overnight Sleep</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <ion-header collapse="condense">
        <ion-toolbar>
            <ion-title size="large">Log Overnight Sleep</ion-title>
        </ion-toolbar>
    </ion-header>

    <ion-item>
        <ion-label>Sleep Start Time</ion-label>
    </ion-item>
    <ion-item>
        <ion-datetime [(ngModel)]="sleepStart"></ion-datetime>
    </ion-item>

    <ion-item>
        <ion-label>Sleep End Time</ion-label>
    </ion-item>
    <ion-item>
        <ion-datetime [(ngModel)]="sleepEnd"></ion-datetime>
    </ion-item>

    <ion-grid>
        <ion-row>
            <ion-col size="6">
                <ion-button expand="block" (click)="navigate('home')">Cancel</ion-button>
            </ion-col>
            <ion-col size="6">
                <ion-button expand="block" (click)="logSleep()">Save Log</ion-button>
            </ion-col>
        </ion-row>
    </ion-grid>

</ion-content>
