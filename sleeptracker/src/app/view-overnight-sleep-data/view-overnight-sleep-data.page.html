<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-title>Overnight Sleep Logs</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <ion-header collapse="condense">
        <ion-toolbar>
            <ion-title size="large">Overnight Sleep Logs</ion-title>
        </ion-toolbar>
    </ion-header>
    <ion-list *ngIf="overnightSleepData.length > 0; else noLogs">
        <ion-card *ngFor="let log of overnightSleepData; let log_index = index">
            <ion-card-header>
                <ion-card-title>{{ log.summaryString() }}</ion-card-title><br>
                <ion-card-subtitle>Slept Duration</ion-card-subtitle>
            </ion-card-header>
            <ion-card-content>
                Start Time: {{ log.sleepStartString()}}
                <br> End Time: {{ log.sleepEndString() }}
                <br><br> Logged on {{ log.dateString() }}
            </ion-card-content>
            <ion-item lines="none">
                <ion-buttons slot="end">
                    <ion-button class="button_text" color="danger" (click)="confirmRemove(log_index)">Remove Log</ion-button>
                </ion-buttons>
            </ion-item>
        </ion-card>
    </ion-list>

    <ng-template #noLogs>
        <ion-card>
            <ion-card-header>
                <ion-card-title>No Logs Available</ion-card-title>
            </ion-card-header>
            <ion-card-content>
                You haven't logged any overnight sleep yet
            </ion-card-content>
        </ion-card>
    </ng-template>

    <ion-grid>
        <ion-row>
            <ion-col size="12">
                <ion-button expand="block" (click)="navigate('home')">Exit</ion-button>
            </ion-col>
        </ion-row>
    </ion-grid>
</ion-content>
