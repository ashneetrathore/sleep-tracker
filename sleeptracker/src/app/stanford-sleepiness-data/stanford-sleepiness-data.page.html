<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-title>Log Sleepiness</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <ion-header collapse="condense">
        <ion-toolbar>
            <ion-title size="large">Log Sleepiness</ion-title>
        </ion-toolbar>
    </ion-header>

    <ion-card>
        <ion-card-content>
            <ion-label>
                Please rate your current level of sleepiness using the Stanford Sleepiness Scale below
            </ion-label><br><br>
            <ion-radio-group [(ngModel)]="sleepinessLevel">
                <ion-item *ngFor="let scaleValue of scaleValues; let i=index">
                    <ion-label>{{i + 1}} | {{ scaleValue }}</ion-label>
                    <ion-radio slot="end" [value]="i + 1"></ion-radio>
                </ion-item>
            </ion-radio-group>
        </ion-card-content>
    </ion-card>

    <ion-grid>
        <ion-row>
            <ion-col size="6">
                <ion-button expand="block" (click)="navigate('home')">Cancel</ion-button>
            </ion-col>
            <ion-col size="6">
                <ion-button expand="block" (click)="logSleepiness()">Save Log</ion-button>
            </ion-col>
        </ion-row>
    </ion-grid>
</ion-content>
